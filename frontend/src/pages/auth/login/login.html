<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Food Store</title>
    <style>body { opacity: 0; }</style>
</head>
<body id="loginBody" class="preload">
    <header>
        <h1>Food Store: Tu tienda de comida favorita!</h1>
        <nav>
            <ul>
                <li><a href="../login/login.html">Ingreso</a></li>
                <li><a href="../registro/registro.html">Registro</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1>Ingresa</h1>
            <form id="form">
                <div>
                    <label for="email">Email:</label>
                    <br>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        autocomplete="off"
                        placeholder="ejemplo@email.com"
                        required
                    >
                </div>
                <div>
                    <label for="password">Contraseña:</label>
                    <br>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="off"
                        placeholder="************"
                        required
                    >
                </div>
                <button type="submit">Ingresar</button>
            </form>
            <p>¿No tenes cuenta? Registrate!</p>
            <button id="registro">Registrarse</button>
        </section>
    </main>

    <footer>
        <p id="p1">Contacto: info@foodstore.com</p>
        <p id="p2">&copy; 2026 Food Store. Todos los derechos reservados.</p>
    </footer>
    <script type="module" src="../login/login.ts"></script>
</body>
</html>
